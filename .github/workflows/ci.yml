name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile scripts
        run: python3 -S -m py_compile scripts/calculate_manse.py scripts/build_kasi_cache.py scripts/validate_caches.py
      - name: Validate bundled caches
        run: python3 scripts/validate_caches.py --start-year 1950 --end-year 2030
      - name: Run smoke tests
        run: bash tests/smoke_test.sh
